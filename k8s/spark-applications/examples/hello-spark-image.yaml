apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: hello-spark-image
  namespace: spark-jobs
  labels:
    app: hello-spark-image
    project: local-spark-minio-lakehouse
spec:
  type: Python
  mode: cluster

  image: local-spark-jobs:0.1.0
  imagePullPolicy: IfNotPresent

  mainApplicationFile: local:///opt/spark/jobs/hello_spark.py
  sparkVersion: 3.5.3

  restartPolicy:
    type: Never

  sparkConf:
    spark.sql.shuffle.partitions: "2"
    spark.kubernetes.executor.deleteOnTermination: "false"

  driver:
    cores: 1
    memory: 512m
    serviceAccount: spark
    labels:
      app: hello-spark-image
      role: driver

  executor:
    cores: 1
    instances: 1
    memory: 512m
    labels:
      app: hello-spark-image
      role: executor